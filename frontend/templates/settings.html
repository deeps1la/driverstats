<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки — {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="bg-light">

<div class="container py-3" style="max-width: 540px;">

    <div class="app-header d-flex align-items-center mb-4">
        <a href="/" class="btn btn-outline-light me-3">← Назад</a>
        <h1 class="fw-bold mb-0 fs-4">⚙️ Настройки</h1>
    </div>

    <div id="loader" class="text-center d-none mb-4">
        <div class="spinner-border text-success"></div>
    </div>

    <div id="error" class="alert alert-danger d-none"></div>
    <div id="success" class="alert alert-success d-none"></div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label small">Название приложения</label>
                <input class="form-control" id="appName">
            </div>
            <div class="mb-3">
                <label class="form-label small">Версия</label>
                <input class="form-control" id="appVersion">
            </div>
            <div class="mb-3">
                <label class="form-label small">Дата начала статистики</label>
                <input type="date" class="form-control" id="startDate">
            </div>
            <div class="mb-3">
                <label class="form-label small">Access Token</label>
                <input class="form-control" id="accessToken">
            </div>
            <div class="mb-3">
                <label class="form-label small">Device ID</label>
                <input class="form-control" id="deviceId">
            </div>
            <div class="mb-3">
                <label class="form-label small">Логин</label>
                <input class="form-control" id="login">
            </div>
            <div class="mb-3">
                <label class="form-label small">Пароль</label>
                <input type="password" class="form-control" id="password">
            </div>
            <button class="btn btn-success w-100" onclick="saveSettings()">💾 Сохранить</button>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">📡 Система</h5>
            <div class="d-flex justify-content-between border-bottom py-2">
                <span class="text-muted small">Связь с Letz</span>
                <strong id="letzStatus">-</strong>
            </div>
            <div class="d-flex justify-content-between border-bottom py-2">
                <span class="text-muted small">Пинг Letz</span>
                <strong id="letzPing">-</strong>
            </div>
            <div class="d-flex justify-content-between border-bottom py-2">
                <span class="text-muted small">Размер БД</span>
                <strong id="dbSize">-</strong>
            </div>
            <div class="d-flex justify-content-between pt-2">
                <span class="text-muted small">Размер приложения</span>
                <strong id="appSize">-</strong>
            </div>
        </div>
    </div>

</div>

<p class="text-center text-muted small mt-4">{{ app_name }} v{{ app_version }} © deepCloud App</p>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadSettings() {
        try {
            const resp = await fetch('/api/settings');
            const data = await resp.json();
            document.getElementById('appName').value = data.app_name || '';
            document.getElementById('appVersion').value = data.app_version || '';
            document.getElementById('startDate').value = data.start_date || '';
            document.getElementById('accessToken').value = data.access_token || '';
            document.getElementById('deviceId').value = data.device_id || '';
            document.getElementById('login').value = data.login || '';
            document.getElementById('password').value = data.password || '';
        } catch (e) {
            console.error(e);
        }
    }

    async function saveSettings() {
        const loader = document.getElementById('loader');
        const error = document.getElementById('error');
        const success = document.getElementById('success');

        loader.classList.remove('d-none');
        error.classList.add('d-none');
        success.classList.add('d-none');

        try {
            const resp = await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    app_name: document.getElementById('appName').value,
                    app_version: document.getElementById('appVersion').value,
                    start_date: document.getElementById('startDate').value,
                    access_token: document.getElementById('accessToken').value,
                    device_id: document.getElementById('deviceId').value,
                    login: document.getElementById('login').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await resp.json();
            if (data.ok) {
                success.textContent = '✅ Настройки сохранены!';
                success.classList.remove('d-none');
                setTimeout(function() { success.classList.add('d-none'); }, 3000);
            }
        } catch (e) {
            error.textContent = '❌ ' + e.message;
            error.classList.remove('d-none');
        } finally {
            loader.classList.add('d-none');
        }
    }

    async function loadSystemInfo() {
        try {
            const resp = await fetch('/api/system-info');
            const data = await resp.json();

            const statusEl = document.getElementById('letzStatus');
            if (data.letz_connected) {
                statusEl.textContent = '✅ Подключено';
                statusEl.className = 'text-success';
            } else {
                statusEl.textContent = '❌ Нет связи';
                statusEl.className = 'text-danger';
            }

            document.getElementById('letzPing').textContent = data.letz_ping + ' мс';
            document.getElementById('dbSize').textContent = data.db_size;
            document.getElementById('appSize').textContent = data.app_size;
        } catch (e) {
            console.error(e);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadSettings();
        loadSystemInfo();
    });
</script>
</body>
</html>
