<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказы — Letz Driver Stats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    <style>
        .badge-standart { background: #4CAF50; color: #fff; }
        .badge-univ { background: #FFC107; color: #000; }
        .badge-confort { background: #2196F3; color: #fff; }
        .badge-prem { background: #9C27B0; color: #fff; }
        .order-row { cursor: pointer; }
        .order-row:hover { background: #f8f9fa; }
        .detail-block { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-top: 4px; }
        .pagination { font-size: 14px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-3" style="max-width: 650px;">

    <div class="app-header d-flex align-items-center mb-4">
        <a href="/" class="btn btn-outline-light me-3">← Назад</a>
        <h1 class="fw-bold mb-0 fs-4">📋 Заказы</h1>
    </div>

    <!-- Счётчик по классам -->
    <div id="classStats" class="d-flex gap-2 flex-wrap mb-3"></div>

    <!-- Фильтр по дате -->
    <div class="card shadow-sm mb-3">
        <div class="card-body py-2">
            <div class="d-flex align-items-center gap-2">
                <label class="form-label mb-0 small text-nowrap">📅 Дата:</label>
                <input type="date" class="form-control form-control-sm" id="dateFilter" onchange="applyFilters()">
                <button class="btn btn-outline-secondary btn-sm" onclick="resetFilters()">Сброс</button>
            </div>
        </div>
    </div>

    <!-- Спиннер -->
    <div id="loader" class="text-center d-none mb-4">
        <div class="spinner-border text-success"></div>
    </div>

    <!-- Ошибка -->
    <div id="error" class="alert alert-danger d-none"></div>

    <!-- Список заказов -->
    <div id="ordersList"></div>

    <!-- Пагинация -->
    <div id="pagination" class="d-flex justify-content-center gap-2 mt-3"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const CLASS_COLORS = {
        'STD': 'badge-standart',
        'UNIV': 'badge-univ',
        'CONF': 'badge-confort',
        'PREM': 'badge-prem'
    };

    let allOrders = [];
    let filteredOrders = [];
    let currentPage = 1;
    const perPage = 10;

    async function loadOrders() {
        const loader = document.getElementById('loader');
        const error = document.getElementById('error');
        loader.classList.remove('d-none');
        error.classList.add('d-none');

        try {
            const resp = await fetch('/api/orders');
            const data = await resp.json();
            if (data.error) throw new Error(data.error);
            allOrders = data.orders;
            applyFilters();
        } catch (e) {
            error.textContent = '❌ ' + e.message;
            error.classList.remove('d-none');
        } finally {
            loader.classList.add('d-none');
        }
    }

    function applyFilters() {
        const dateVal = document.getElementById('dateFilter').value;

        filteredOrders = allOrders.filter(o => {
            if (dateVal) {
                const orderDate = o.date?.slice(0, 10); // YYYY-MM-DD
                return orderDate === dateVal;
            }
            return true;
        });

        currentPage = 1;
        updateClassStats();
        renderPage();
        renderPagination();
    }

    function resetFilters() {
        document.getElementById('dateFilter').value = '';
        applyFilters();
    }

    function updateClassStats() {
        const stats = {};
        for (const o of filteredOrders) {
            const cls = o.class_type || '?';
            stats[cls] = (stats[cls] || 0) + 1;
        }

        let html = '';
        for (const [cls, count] of Object.entries(stats)) {
            const badge = CLASS_COLORS[cls] || 'badge-secondary';
            html += `<span class="badge ${badge}">${cls}: ${count}</span>`;
        }
        document.getElementById('classStats').innerHTML = html || '<span class="text-muted small">Нет заказов</span>';
    }

    function renderPage() {
        const start = (currentPage - 1) * perPage;
        const pageOrders = filteredOrders.slice(start, start + perPage);
        const list = document.getElementById('ordersList');

        if (!pageOrders.length) {
            list.innerHTML = '<div class="text-center text-muted py-4">Заказов не найдено</div>';
            return;
        }

        let html = '';
        for (const o of pageOrders) {
            const d = new Date(o.date);
            const dateStr = d.toLocaleDateString('ru-RU');
            const classBadge = CLASS_COLORS[o.class_type] || 'badge-secondary';

            html += `
            <div class="card shadow-sm mb-2" id="order-${o.id}">
                <div class="card-body py-2 order-row" onclick="toggleDetail(${o.id})">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="badge ${classBadge} me-2">${o.class_type || '?'}</span>
                            <small>${dateStr}</small>
                            <small class="text-muted ms-2">#${o.id}</small>
                        </div>
                        <div class="text-end">
                            <strong>${o.amount?.toFixed(2)} MDL</strong>
                            <div class="small text-muted">${o.distance_km?.toFixed(1)} км</div>
                        </div>
                    </div>
                </div>
                <div class="detail-block d-none" id="detail-${o.id}">
                    <div class="text-center"><div class="spinner-border spinner-border-sm"></div></div>
                </div>
            </div>`;
        }
        list.innerHTML = html;
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredOrders.length / perPage);
        const pag = document.getElementById('pagination');

        if (totalPages <= 1) {
            pag.innerHTML = '';
            return;
        }

        let html = '';
        html += `<button class="btn btn-sm btn-outline-secondary" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Назад</button>`;
        html += `<span class="align-self-center">${currentPage} / ${totalPages}</span>`;
        html += `<button class="btn btn-sm btn-outline-secondary" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Вперёд →</button>`;
        pag.innerHTML = html;
    }

    function goToPage(page) {
        const totalPages = Math.ceil(filteredOrders.length / perPage);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderPage();
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function toggleDetail(orderId) {
        const detailDiv = document.getElementById('detail-' + orderId);
        if (!detailDiv.classList.contains('d-none')) {
            detailDiv.classList.add('d-none');
            return;
        }

        detailDiv.classList.remove('d-none');
        detailDiv.innerHTML = '<div class="text-center"><div class="spinner-border spinner-border-sm"></div></div>';

        try {
            const resp = await fetch('/api/order/' + orderId);
            const data = await resp.json();
            if (data.error) throw new Error(data.error);

            const d = new Date(data.date);
            const timeStr = d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            detailDiv.innerHTML = `
                <p class="mb-1"><strong>🕒 Время:</strong> ${timeStr}</p>
                <p class="mb-1"><strong>💰 Сумма:</strong> ${data.amount?.toFixed(2)} MDL</p>
                <p class="mb-1"><strong>💸 Комиссия:</strong> -${data.commission?.toFixed(2)} MDL</p>
                <p class="mb-1"><strong>🛣️ Расстояние:</strong> ${data.distance?.toFixed(1)} км</p>
                <p class="mb-1"><strong>💳 Оплата:</strong> ${data.payment_type || '-'}</p>
                <p class="mb-1"><strong>📍 Адрес:</strong> ${data.address || '-'}</p>
            `;
        } catch (e) {
            detailDiv.innerHTML = `<div class="text-danger">Ошибка: ${e.message}</div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', loadOrders);
</script>
</body>
</html>
