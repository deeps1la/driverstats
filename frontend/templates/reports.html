<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчёты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="bg-light">

<div class="container py-3" style="max-width: 540px;">

    <div class="app-header d-flex align-items-center mb-4">
        <a href="/" class="btn btn-outline-light me-3">← Назад</a>
        <h1 class="fw-bold mb-0 fs-4">📊 Отчёты</h1>
    </div>

    <!-- Выбор даты -->
    <div class="card shadow-sm mb-3">
        <div class="card-body py-2">
            <div class="d-flex align-items-center gap-2">
                <label class="form-label mb-0 small">📅</label>
                <input type="date" class="form-control form-control-sm" id="reportDate" onchange="loadReport()">
            </div>
        </div>
    </div>

    <!-- Спиннер -->
    <div id="loader" class="text-center d-none mb-4">
        <div class="spinner-border text-success"></div>
    </div>

    <!-- Контент -->
    <div id="content" class="d-none">

        <div class="card shadow-sm mb-2">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between"><span class="text-muted small">✅ Заказы</span><strong id="r-orders">-</strong></div>
            </div>
        </div>
        <div class="card shadow-sm mb-2">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between"><span class="text-muted small">🛣️ Километраж</span><strong id="r-distance">-</strong></div>
            </div>
        </div>
        <div class="card shadow-sm mb-2">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between"><span class="text-muted small">💰 Касса брутто</span><strong id="r-income">-</strong></div>
            </div>
        </div>
        <div class="card shadow-sm mb-2">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between"><span class="text-muted small">💸 Комиссия</span><strong id="r-commission" class="text-danger">-</strong></div>
            </div>
        </div>
        <div class="card shadow-sm mb-2">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between"><span class="text-muted small">📊 % Z</span><strong id="r-percentZ">-</strong></div>
            </div>
        </div>
        <div class="card shadow-sm mb-2">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between"><span class="text-muted small">📋 План</span><strong>0 MDL</strong></div>
            </div>
        </div>
        <div class="card shadow-sm mb-2">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between"><span class="text-muted small">⛽ Заправка</span><strong>0 MDL</strong></div>
            </div>
        </div>

        <!-- Счётчики по классам -->
        <div class="card shadow-sm mb-2">
            <div class="card-body py-2">
                <div class="text-muted small mb-1">🚗 По классам</div>
                <div id="r-classes" class="d-flex gap-2 flex-wrap"></div>
            </div>
        </div>

        <div class="card shadow-sm mb-3">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between"><span class="text-muted small">📈 Чистый доход</span><strong id="r-netProfit" class="text-success">-</strong></div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const CLASS_COLORS = {
        'STD': 'badge-standart',
        'UNIV': 'badge-univ',
        'CONF': 'badge-confort',
        'PREM': 'badge-prem'
    };

    async function loadReport() {
        const date = document.getElementById('reportDate').value;
        if (!date) return;

        const loader = document.getElementById('loader');
        const content = document.getElementById('content');

        loader.classList.remove('d-none');
        content.classList.add('d-none');

        try {
            const dateFrom = date + 'T00:00:00';
            const dateTo = date + 'T23:59:59';
            const resp = await fetch('/api/report?from=' + dateFrom + '&to=' + dateTo);
            const data = await resp.json();

            document.getElementById('r-orders').textContent = data.orders;
            document.getElementById('r-distance').textContent = data.distance + ' км';
            document.getElementById('r-income').textContent = data.income + ' MDL';
            document.getElementById('r-commission').textContent = '-' + data.commission + ' MDL';
            document.getElementById('r-percentZ').textContent = data.percent_z + '%';
            document.getElementById('r-netProfit').textContent = data.net_profit + ' MDL';

            // Классы
            let classesHtml = '';
            for (const [cls, count] of Object.entries(data.class_counts)) {
                const badge = CLASS_COLORS[cls] || 'badge-secondary';
                classesHtml += `<span class="badge ${badge}">${cls}: ${count}</span>`;
            }
            document.getElementById('r-classes').innerHTML = classesHtml || '<span class="text-muted small">Нет данных</span>';

            content.classList.remove('d-none');
        } catch (e) {
            console.error(e);
        } finally {
            loader.classList.add('d-none');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('reportDate').value = today;
        loadReport();
    });
</script>
</body>
</html>
