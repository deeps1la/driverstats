<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смены — {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="bg-light">

<div class="container py-3" style="max-width: 650px;">

    <div class="app-header d-flex align-items-center mb-4">
        <a href="/" class="btn btn-outline-light me-3">← Назад</a>
        <h1 class="fw-bold mb-0 fs-4">🕐 Смены</h1>
    </div>

    <div id="loader" class="text-center d-none mb-4">
        <div class="spinner-border text-success"></div>
    </div>

    <div id="error" class="alert alert-danger d-none"></div>

    <div id="shiftsList"></div>

</div>

<p class="text-center text-muted small mt-4">{{ app_name }} v{{ app_version }} © deepCloud App</p>

<script>
    async function loadShifts() {
        const loader = document.getElementById('loader');
        const error = document.getElementById('error');
        loader.classList.remove('d-none');
        error.classList.add('d-none');

        try {
            const resp = await fetch('/api/shifts');
            const data = await resp.json();
            if (data.error) throw new Error(data.error);
            renderShifts(data.shifts);
        } catch (e) {
            error.textContent = '❌ ' + e.message;
            error.classList.remove('d-none');
        } finally {
            loader.classList.add('d-none');
        }
    }

    function renderShifts(shifts) {
        const list = document.getElementById('shiftsList');
        if (!shifts.length) {
            list.innerHTML = '<div class="text-center text-muted py-4">Нет смен</div>';
            return;
        }

        let html = '';
        for (const s of shifts) {
            const opened = s.opened_at?.replace('T', ' ').slice(0, 16) || '-';
            const closed = s.closed_at ? s.closed_at.replace('T', ' ').slice(0, 16) : '🟢 Открыта';
            const income = s.stats?.income || 0;
            const commission = s.stats?.commission || 0;
            const net = income - commission;
            const km = s.total_km || s.stats?.distance_km || 0;

            html += `
            <a href="/shift/${s.id}" class="text-decoration-none">
                <div class="card shadow-sm mb-2 shift-card">
                    <div class="card-body py-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>Смена #${s.id}</strong>
                                <div class="small text-muted">${opened} — ${closed}</div>
                            </div>
                            <div class="text-end">
                                <strong>${income.toFixed(0)} MDL</strong>
                                <div class="small text-muted">${km.toFixed(1)} км</div>
                            </div>
                        </div>
                    </div>
                </div>
            </a>`;
        }
        list.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', loadShifts);
</script>

<style>
    .shift-card { cursor: pointer; transition: transform 0.15s; border: none; border-radius: 12px; }
    .shift-card:hover { transform: translateY(-2px); background: #f0f9ff; }
</style>
</body>
</html>
